<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link href="../static/css/bootstrap.css" rel="stylesheet">
    <link href="../static/css/estilo.css" rel="stylesheet">
    <link rel="icon" href="../static/img/url.png">

    <title>404 - URL não encontrada</title>
</head>
<body class="bg-dark">
<div class="container d-flex justify-content-center flex-column vh-100">

    <div class="d-flex align-items-center justify-content-center mb-4">
        <h1 class="text-center text-light mx-2">
            Encurtador de URL
        </h1>
        <div>
            <img src="../static/img/url.png" width="60" alt="Logo">
        </div>
    </div>

    <div class="text-center text-light">
        <h2 class="mb-3">404</h2>
        <p class="fs-5">
            Essa URL não existe, nunca existiu ou já foi pro limbo.
        </p>
        <p class="text-muted">
            Se você digitou isso manualmente, parabéns pela coragem.
        </p>

        <a href="/" class="btn btn-primary btn-lg mt-3">
            Voltar para a página inicial
        </a>
    </div>

</div>
</body>
</html>
